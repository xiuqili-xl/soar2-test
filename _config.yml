# Site settings
course_name: Summer Open And Reproducible Research (SOAR²) Intensive
course_description: "One liner explanation."

course_semester: "Sep 2026"

baseurl: "/math-tools" # the subpath of your site, e.g. /blog/
url: "http://druckmann-lab.github.io/" # the base hostname & protocol for your site

schoolname: "UCSB Library"
schoolurl: "https://www.library.ucsb.edu/"
#twitter_username: username 

address: |
    UCSB Library
    Santa Barabara, CA

# Set your Google Analytics tracking ID (set up yours at http://www.google.com/analytics/)
# google_analytics: UA-XXXXXXXX-X

### Do not change the followings unless you know what you are doing ###

# Build settings
markdown: kramdown

# Other options
permalink: blog/:year/:month/:title
excerpt_separator: "<!--more-->"

include: ['_images', '_css']
exclude: ['develop']

dateformat: "%a %-m/%-d/%Y"
onlydateformat: "%-m/%-d/%Y"
timeformat: "%-I:%M %p"

timezone: America/Los_Angeles

future: true
collections:
    events:
        output: true
    lectures:
        output: true
    assignments:
        output: true
    announcements:
        output: false


defaults:
  - scope:
      path: ""
      type: "assignments"
    values:
      layout: "assignment"
