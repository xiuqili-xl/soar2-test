<div class="col col-1">{{ include.event.name }}</div>

<div class="col col-1-2" data-label="Date">
    {{ include.event.date | date: site.dateformat }}
    {% unless include.event.hide_time %}
    <br class="date-spliter" />{{ include.event.date | date: site.timeformat }}
    {% endunless %}
</div>

<div class="col col-1-3" data-label="Location">
    {{ include.event.location }}
</div>

<div class="col col-2" data-label="Session">{{ include.event.title }}</div>

<div class="col col-4 markdown-content" data-label="Material">{{ include.event.content }}</div>
