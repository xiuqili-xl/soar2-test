<div class="col col-1" style="color: #8a6d3b ;font-weight: bold;" data-label="Event">Due</div>

<div class="col col-1-2" style="font-weight: bold" data-label="Date">
    {{ event.date | date: site.dateformat }}
    <br class="date-spliter"/>{{ event.date | date: site.timeformat }}
</div>

<div class="col col-1-3" data-label="Location">
    {{ include.event.location }}
</div>

<div class="col col-2" style="font-weight: bold" data-label="Session">
    {{ include.event.title }}
</div>

<div class="col col-4 markdown-content" data-label="Material">
    {{ include.event.content }}
</div>
